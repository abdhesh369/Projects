{% extends "base.html" %}
   
   {% block content %}
       <h1>📚 Study Questions</h1>
       <h3 style="color: #7f8c8d;">Topic: {{ topic }}</h3>
       
       <div style="background-color: #ecf0f1; padding: 20px; border-radius: 5px; margin: 20px 0;">
           <pre style="white-space: pre-wrap; font-family: Arial;">{{ questions }}</pre>
       </div>
       
       <a href="/" style="display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #95a5a6; color: white; text-decoration: none; border-radius: 5px;">
           Generate More Questions
       </a>
   {% endblock %}
